<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bed Exit Alarm – Bangkok Hospital Pattaya</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#1B3A6B;--navy2:#24509A;--red:#C0272D;
  --accent:#E8EEF8;--gray-header:#4A6FA5;
  --border:#C5D3E8;--white:#fff;--bg:#EDF1F7;
  --text:#1a2a3a;--green:#1a7a3c;--green-bg:#E6F4EC;
  --shadow:0 4px 24px rgba(27,58,107,.13);--radius:8px;
  --font:'Sarabun',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  color:#fff;padding:12px 20px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
  position:sticky;top:0;z-index:100;
}
.topbar-title{flex:1;min-width:180px}
.topbar-title h1{font-size:1rem;font-weight:700;line-height:1.3}
.topbar-title p{font-size:.72rem;opacity:.8;margin-top:2px}
.nav-tabs{display:flex;gap:5px;flex-wrap:wrap}
.nav-btn{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:7px 14px;border-radius:5px;cursor:pointer;
  font-family:var(--font);font-size:.8rem;font-weight:600;
  transition:all .18s;white-space:nowrap;
}
.nav-btn.active{background:#fff;color:var(--navy)}

/* DATE BAR */
.date-bar{
  background:#fff;border-bottom:2px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
}
.date-bar label{font-size:.82rem;font-weight:700;color:var(--navy)}
.date-bar input[type=date], .date-bar input[type=month]{
  border:1.5px solid var(--border);border-radius:5px;
  padding:6px 10px;font-family:var(--font);font-size:.83rem;
  color:var(--text);background:#f5f8ff;outline:none;cursor:pointer;
}
.date-nav button{
  background:var(--accent);border:1px solid var(--border);border-radius:4px;
  padding:5px 10px;cursor:pointer;font-size:.9rem;color:var(--navy);
}
.date-display{font-size:.85rem;font-weight:600;color:var(--navy2)}

.main{max-width:1200px;margin:0 auto;padding:20px 16px 48px}

.table-responsive {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
}
.form-card{min-width: 1100px; background: #fff;}

.shift-label{display:flex;align-items:center;gap:12px;margin:20px 0 10px}
.shift-badge{background:var(--navy);color:#fff;padding:5px 16px;border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap}
.shift-badge.night{background:#2d3a6b}

/* FORM GRIDS - ปรับความกว้างคอลัมน์แรกเพื่อรองรับข้อความยาว */
.info-grid{display:grid;grid-template-columns:350px repeat(10,1fr);border-bottom:2px solid var(--navy)}
.ig-label{background:var(--gray-header);color:#fff;font-size:.8rem;font-weight:700;padding:10px;text-align:right;border-right:1px solid rgba(255,255,255,.2);border-bottom:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:flex-end}
.ig-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.ig-cell input{width:100%;min-height:35px;border:none;outline:none;font-family:var(--font);font-size:.73rem;text-align:center;background:#f0f5ff;display:block}

.check-grid{display:grid;grid-template-columns:350px repeat(10,1fr)}
.check-grid-hdr{grid-column:1/-1;background:var(--navy);color:#fff;padding:10px 14px;font-size:.85rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,.12)}
.ck-label{padding:10px;font-size:.75rem;font-weight:500;display:flex;align-items:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#f8faff;line-height:1.4}
.ck-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:45px;background:#fff}
.ck-cell.checked{background:var(--green-bg)}
.ck-mark{font-size:1.2rem;color:var(--green);display:none;font-weight:800}
.ck-cell.checked .ck-mark{display:block}

.inspector-grid{display:grid;grid-template-columns:350px repeat(10,1fr)}
.ins-label{background:var(--gray-header);color:#fff;font-size:.8rem;font-weight:700;padding:10px;text-align:right;border-right:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:flex-end}
.ins-cell{border-right:1px solid var(--border)}
.ins-cell input{width:100%;min-height:40px;border:none;outline:none;font-family:var(--font);font-size:.75rem;text-align:center;background:#f0f5ff;display:block}

.ready-box { background: #fff; padding: 12px 20px; border: 1px solid var(--border); border-top: none; display: flex; gap: 20px; font-size: 0.85rem; color: var(--navy); font-weight: bold; align-items: center; border-radius: 0 0 8px 8px; }

/* TABLES */
.room-table-hist{width:100%; border-collapse:collapse; background:#fff;}
.room-table-hist th{background:var(--gray-header); color:#fff; padding:10px 8px; font-size:.75rem; text-align:center; border:1px solid rgba(255,255,255,0.2)}
.room-table-hist td{padding:8px; font-size:.8rem; border:1px solid #ddd; text-align:center;}
.dot-check{color:var(--green); font-weight:bold;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:var(--radius);max-width:400px;width:100%;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}

.btn-del-main{background:var(--red); color:#fff; padding:8px 15px; border-radius:5px; border:none; cursor:pointer; font-size:.8rem; font-weight:bold;}
.btn-edit-sm{background:#fff; color:var(--navy); border:1px solid var(--navy); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:.75rem; font-weight:bold;}
.btn-del-sm{background:#fff; color:var(--red); border:1px solid var(--red); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:.75rem; font-weight:bold;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <h1>บันทึก Bed Exit Alarm (กระดุม)</h1>
    <p>Bangkok Hospital Pattaya</p>
  </div>
  <div class="nav-tabs">
    <button class="nav-btn active" id="nav-form" onclick="showPage('form')">📋 บันทึก</button>
    <button class="nav-btn" id="nav-history" onclick="showPage('history')">🗂 ประวัติ</button>
    <button class="nav-btn" id="nav-summary" onclick="showPage('summary')">📊 สรุปผล</button>
  </div>
</div>

<div class="date-bar" id="date-bar-container">
  <label>📅 วันที่ :</label>
  <div class="date-nav"><button onclick="changeDate(-1)">◀</button></div>
  <input type="date" id="globalDate" onchange="onDateChange()"/>
  <div class="date-nav"><button onclick="changeDate(1)">▶</button></div>
  <span class="date-display" id="dateDisplay"></span>
</div>

<div id="page-form" class="main">
  <div class="shift-label"><span class="shift-badge">☀️ กะเช้า 07:00 – 19:00</span></div>
  <div class="table-responsive"><div class="form-card" id="card-day"></div></div>
  <div class="ready-box">
    <span>ความพร้อมใช้งาน:</span>
    <label><input type="radio" name="ready_day" value="พร้อมใช้" onchange="setReady('day', this.value)"> พร้อมใช้</label>
    <label><input type="radio" name="ready_day" value="ไม่พร้อมใช้" onchange="setReady('day', this.value)"> ไม่พร้อมใช้</label>
  </div>
  <div style="margin-top:10px; display:flex; gap:10px; margin-bottom:30px">
    <button class="nav-btn" style="background:var(--navy)" onclick="saveShift('day')">💾 บันทึกกะเช้า</button>
    <button class="nav-btn" style="background:#fff; color:var(--navy); border:1px solid var(--border)" onclick="clearShift('day')">🗑 ล้าง</button>
    <span id="status-day" style="color:var(--green); font-weight:700; opacity:0; transition: .3s">✅ บันทึกแล้ว</span>
  </div>

  <div class="shift-label"><span class="shift-badge night">🌙 กะดึก 19:00 – 07:00</span></div>
  <div class="table-responsive"><div class="form-card" id="card-night"></div></div>
  <div class="ready-box">
    <span>ความพร้อมใช้งาน:</span>
    <label><input type="radio" name="ready_night" value="พร้อมใช้" onchange="setReady('night', this.value)"> พร้อมใช้</label>
    <label><input type="radio" name="ready_night" value="ไม่พร้อมใช้" onchange="setReady('night', this.value)"> ไม่พร้อมใช้</label>
  </div>
  <div style="margin-top:10px; display:flex; gap:10px; margin-bottom:40px">
    <button class="nav-btn" style="background:var(--navy)" onclick="saveShift('night')">💾 บันทึกกะดึก</button>
    <button class="nav-btn" style="background:#fff; color:var(--navy); border:1px solid var(--border)" onclick="clearShift('night')">🗑 ล้าง</button>
    <span id="status-night" style="color:var(--green); font-weight:700; opacity:0; transition: .3s">✅ บันทึกแล้ว</span>
  </div>
</div>

<div id="page-history" class="main" style="display:none">
  <div style="background:#fff; padding:15px; border-radius:8px; border:1px solid var(--border); margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px">
    <div>
      <label style="font-size:.8rem; font-weight:bold; color:var(--navy)">📅 เลือกเดือนประวัติ:</label>
      <input type="month" id="historyMonth" onchange="loadHistory()" style="padding:6px; border-radius:5px; border:1px solid var(--border)"/>
    </div>
    <button class="btn-del-main" onclick="deleteMonth()">🗑 ลบข้อมูลทั้งเดือน</button>
  </div>
  <div id="historyList"></div>
</div>

<div id="page-summary" class="main" style="display:none">
  <div style="background:#fff; padding:15px; border-radius:8px; border:1px solid var(--border); margin-bottom:15px; display:flex; gap:20px; flex-wrap:wrap;">
    <div>
      <label style="font-weight:bold">📊 สรุปรายงานเดือน:</label>
      <input type="month" id="summaryMonth" onchange="loadSummary('month')" style="padding:6px; border-radius:5px; border:1px solid var(--border)"/>
    </div>
    <div>
      <label style="font-weight:bold">📅 หรือระบุรายวัน:</label>
      <input type="date" id="summaryDate" onchange="loadSummary('day')" style="padding:6px; border-radius:5px; border:1px solid var(--border)"/>
    </div>
  </div>
  <div id="summaryContent" class="table-responsive"></div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h3 style="color:var(--navy); margin-bottom:10px">⚠️ ยืนยันการดำเนินการ</h3>
    <p id="confirmMsg" style="font-size:.9rem; margin-bottom:20px; line-height:1.4"></p>
    <div style="display:flex; justify-content:flex-end; gap:10px">
      <button class="btn-edit-sm" onclick="closeModal()">ยกเลิก</button>
      <button class="nav-btn" id="confirmOkBtn" style="background:var(--red); border:none">ตกลง</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2Z2vTVhzepWHtE4F9g1df97itPMGfOyA",
  authDomain: "bed-exit-alarm.firebaseapp.com",
  databaseURL: "https://bed-exit-alarm-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bed-exit-alarm",
  storageBucket: "bed-exit-alarm.firebasestorage.app",
  messagingSenderId: "405252502824",
  appId: "1:405252502824:web:237ac2475c74841116cc1d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const COLS = 10;
const THAI_MONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

// แก้ไขข้อความตรวจสอบตามรูปภาพ
const CHECKS = [
    {k:'gateway', l:'เช็คการเชื่อมต่อระหว่าง Gateway และ Sensor (กระดุม) หากไม่เชื่อมต่อ ให้เช็คว่าเครื่องไอแพดเปิดบลูทูธอยู่หรือไม่'}, 
    {k:'wifi', l:'เช็คการเชื่อมต่อ wifi'}, 
    {k:'attach', l:'เช็คการติดกระดุมถูกต้องหรือไม่'}, 
    {k:'sensor', l:'เช็คการเปิด-ปิด ของ Sensor (กระดุม)'}, 
    {k:'dist', l:'เช็คระยะห่าง ระหว่าง Gateway และ Sensor (กระดุม) ไม่ควรห่างเกิน 8-10 เมตร เพราะเป็นระยะของบลูทูธ'}
];

let formData = { day: { columns: emptyCols(), readyStatus: '' }, night: { columns: emptyCols(), readyStatus: '' } };

function emptyCols() {
  let r = {};
  for(let i=0; i<COLS; i++) r[i] = { device:'', room:'', date:'', time:'', battery:'', gateway:false, wifi:false, attach:false, sensor:false, dist:false, inspector:'' };
  return r;
}

window.onDateChange = async () => {
  const date = document.getElementById('globalDate').value;
  updateDateDisplay();
  for(let s of ['day','night']) {
    const snap = await get(ref(db, `bedExitAlarm/${date}_${s}`));
    if(snap.exists()) {
      formData[s] = snap.val();
      document.getElementsByName(`ready_${s}`).forEach(r => r.checked = (r.value === formData[s].readyStatus));
    } else {
      formData[s] = { columns: emptyCols(), readyStatus: '' };
      document.getElementsByName(`ready_${s}`).forEach(r => r.checked = false);
    }
    renderCard(s);
  }
};

window.renderCard = (shift) => {
  const card = document.getElementById('card-' + shift);
  const data = formData[shift].columns;
  const date = document.getElementById('globalDate').value;
  let h = `<div class="info-grid">`;
  
  // แก้ไขหัวข้อเป็น "เบอร์เครื่อง" ตามรูป
  const infoRows = [{l:'เบอร์เครื่อง', f:'device'}, {l:'Room', f:'room'}, {l:'Date', f:'date', t:'date'}, {l:'Time', f:'time', t:'time'}];
  
  infoRows.forEach(row => {
    h += `<div class="ig-label">${row.l}</div>`;
    for(let i=0; i<COLS; i++) {
      let v = data[i][row.f] || (row.f==='date'?date:'');
      h += `<div class="ig-cell"><input type="${row.t||'text'}" value="${v}" oninput="updateVal('${shift}',${i},'${row.f}',this.value)"></div>`;
    }
  });
  
  // แก้ไขหัวข้อตรวจสอบและแบตเตอรี่ตามรูป
  h += `</div><div class="check-grid"><div class="check-grid-hdr">ตรวจสอบการใช้งานของ Bed Exit Alarm</div><div class="ck-label" style="background:#f0f5ff; font-weight:bold;">เช็คแบตเตอรี่ สถานะ</div>`;
  for(let i=0; i<COLS; i++) {
    h += `<div class="ck-cell"><select style="font-size:.65rem; width:90%" onchange="updateVal('${shift}',${i},'battery',this.value)">
      <option value="">-</option><option value="High" ${data[i].battery==='High'?'selected':''}>🟢 High</option>
      <option value="Medium" ${data[i].battery==='Medium'?'selected':''}>🟡 Med</option>
      <option value="Low" ${data[i].battery==='Low'?'selected':''}>🔴 Low</option></select></div>`;
  }
  CHECKS.forEach(ck => {
    h += `<div class="ck-label">${ck.l}</div>`;
    for(let i=0; i<COLS; i++) h += `<div class="ck-cell ${data[i][ck.k]?'checked':''}" onclick="toggleCk('${shift}',${i},'${ck.k}',this)"><span class="ck-mark">✔</span></div>`;
  });
  h += `</div><div class="inspector-grid"><div class="ins-label">ผู้ตรวจสอบ</div>`;
  for(let i=0; i<COLS; i++) h += `<div class="ins-cell"><input type="text" value="${data[i].inspector||''}" oninput="updateVal('${shift}',${i},'inspector',this.value)"></div>`;
  card.innerHTML = h + `</div>`;
};

window.updateVal=(s,i,f,v)=>{ formData[s].columns[i][f]=v; };
window.setReady=(s,v)=>{ formData[s].readyStatus=v; };
window.toggleCk=(s,i,k,el)=>{ formData[s].columns[i][k]=!formData[s].columns[i][k]; el.classList.toggle('checked'); };

window.saveShift = async (s) => {
  const date = document.getElementById('globalDate').value;
  await set(ref(db, `bedExitAlarm/${date}_${s}`), { ...formData[s], date, shift: s });
  const st = document.getElementById('status-'+s); st.style.opacity=1; setTimeout(()=>st.style.opacity=0, 2000);
};

window.clearShift = (s) => openModal(`ล้างข้อมูลที่กรอกอยู่ของกะ${s==='day'?'เช้า':'ดึก'}?`, () => {
  formData[s] = { columns: emptyCols(), readyStatus: '' };
  document.getElementsByName(`ready_${s}`).forEach(r => r.checked = false);
  renderCard(s);
});

window.loadHistory = async () => {
  const month = document.getElementById('historyMonth').value;
  const snap = await get(ref(db, 'bedExitAlarm'));
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if(!snap.exists()) { list.innerHTML = '<p style="text-align:center; padding:20px; color:#999">ไม่พบข้อมูลประวัติ</p>'; return; }
  
  const allData = Object.values(snap.val()).filter(d => d.date && d.date.startsWith(month));
  const byDate = {};
  allData.forEach(d => { if(!byDate[d.date]) byDate[d.date]=[]; byDate[d.date].push(d); });

  Object.keys(byDate).sort().reverse().forEach(date => {
    let dayDiv = document.createElement('div');
    dayDiv.className = 'day-group';
    dayDiv.style = "margin-bottom:20px; border:1px solid var(--border); background:#fff; border-radius:8px; overflow:hidden;";
    let h = `<div style="background:var(--navy); color:#fff; padding:10px 15px; display:flex; justify-content:space-between; align-items:center;">
              <span style="font-weight:bold">📅 ${fmtThai(date)}</span>
              <button class="btn-del-sm" style="background:var(--red); color:#fff" onclick="deleteDay('${date}')">ลบทั้งวัน</button>
            </div>`;
    
    byDate[date].sort((a,b)=>a.shift==='day'?-1:1).forEach(d => {
      const rooms = Object.values(d.columns).filter(c => c.room);
      h += `<div style="background:#f9f9f9; padding:8px 15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
              <span style="font-size:.85rem; font-weight:700; color:var(--navy)">กะ${d.shift==='day'?'เช้า':'ดึก'} (สถานะ: ${d.readyStatus||'-'})</span>
              <div style="display:flex; gap:5px"><button class="btn-edit-sm" onclick="editEntry('${d.date}','${d.shift}')">แก้ไข</button><button class="btn-del-sm" onclick="deleteEntry('${d.date}_${d.shift}')">ลบ</button></div>
            </div>`;
      if(rooms.length){
        h += `<div class="table-responsive"><table class="room-table-hist"><thead><tr><th>ห้อง</th><th>เบอร์เครื่อง</th><th>เวลา</th><th>แบต</th><th>GW</th><th>Wifi</th><th>ติดกระดุม</th><th>Sensor</th><th>ระยะ</th><th>ผู้ตรวจ</th></tr></thead><tbody>`;
        rooms.forEach(c => {
          h += `<tr><td><b>${c.room}</b></td><td>${c.device||'-'}</td><td>${c.time||'-'}</td><td>${c.battery||'-'}</td>
            <td>${c.gateway?'<span class="dot-check">✔</span>':'-'}</td>
            <td>${c.wifi?'<span class="dot-check">✔</span>':'-'}</td>
            <td>${c.attach?'<span class="dot-check">✔</span>':'-'}</td>
            <td>${c.sensor?'<span class="dot-check">✔</span>':'-'}</td>
            <td>${c.dist?'<span class="dot-check">✔</span>':'-'}</td>
            <td>${c.inspector||'-'}</td></tr>`;
        });
        h += `</tbody></table></div>`;
      }
    });
    dayDiv.innerHTML = h;
    list.appendChild(dayDiv);
  });
};

window.loadSummary = async (type = 'month') => {
  const m = document.getElementById('summaryMonth').value;
  const dDay = document.getElementById('summaryDate').value;
  const snap = await get(ref(db, 'bedExitAlarm'));
  const content = document.getElementById('summaryContent');
  if(!snap.exists()) { content.innerHTML = '<p style="text-align:center; padding:20px;">ไม่มีข้อมูล</p>'; return; }
  let filteredData = Object.values(snap.val()).filter(d => type === 'day' ? d.date === dDay : d.date && d.date.startsWith(m));
  filteredData.sort((a,b) => a.date.localeCompare(b.date) || (a.shift === 'day' ? -1 : 1));
  let h = `<table class="room-table-hist" style="min-width:100%"><thead><tr style="background:var(--navy); color:#fff">
          <th style="width:120px">วันที่/กะ</th><th>Room</th><th>เบอร์เครื่อง</th><th>แบตเตอรี่</th><th>ผู้ตรวจสอบ</th><th>ความพร้อมใช้งาน</th>
          </tr></thead><tbody>`;
  if(filteredData.length === 0) h += `<tr><td colspan="6" style="padding:20px; color:#999;">ไม่พบข้อมูลในช่วงเวลาที่เลือก</td></tr>`;
  filteredData.forEach(d => {
    const rows = Object.values(d.columns).filter(c => c.room);
    rows.forEach((c, idx) => {
      h += `<tr><td style="font-size:0.7rem; color:#666">${idx===0? `<b>${d.date}</b><br>(${d.shift==='day'?'เช้า':'ดึก'})` : ''}</td>
        <td><b>${c.room}</b></td><td>${c.device || '-'}</td><td style="color:${c.battery==='Low'?'red':(c.battery==='Medium'?'orange':'green')}">${c.battery || '-'}</td>
        <td>${c.inspector || '-'}</td><td style="font-weight:bold; color:${d.readyStatus==='พร้อมใช้'?'#1a7a3c':'#C0272D'}">${d.readyStatus || '-'}</td></tr>`;
    });
  });
  content.innerHTML = h + `</tbody></table>`;
};

window.deleteDay = (date) => openModal(`ลบข้อมูล "ทุกกะ" ของวันที่ ${fmtThai(date)} ใช่หรือไม่?`, async () => {
  const snap = await get(ref(db, 'bedExitAlarm'));
  const keys = Object.keys(snap.val()).filter(k => k.startsWith(date));
  for(let k of keys) await remove(ref(db, `bedExitAlarm/${k}`));
  loadHistory();
});
window.deleteMonth = () => {
  const m = document.getElementById('historyMonth').value;
  openModal(`⚠️ ยืนยันลบข้อมูลทั้งหมดของเดือน ${m}?`, async () => {
    const snap = await get(ref(db, 'bedExitAlarm'));
    const keys = Object.keys(snap.val()).filter(k => k.includes(m));
    for(let k of keys) await remove(ref(db, `bedExitAlarm/${k}`));
    loadHistory();
  });
};
window.deleteEntry = (key) => openModal('ลบข้อมูลกะนี้ใช่หรือไม่?', async () => { await remove(ref(db, `bedExitAlarm/${key}`)); loadHistory(); });
window.editEntry = (d, s) => { document.getElementById('globalDate').value = d; showPage('form'); onDateChange(); };
window.showPage = (p) => {
  ['form','history','summary'].forEach(id => {
    document.getElementById('page-'+id).style.display = (id===p?'block':'none');
    document.getElementById('nav-'+id).classList.toggle('active', id===p);
  });
  document.getElementById('date-bar-container').style.display = (p==='form'?'flex':'none');
  if(p==='history') loadHistory();
  if(p==='summary') loadSummary('month');
};
window.openModal = (msg, onConfirm) => {
  document.getElementById('confirmMsg').innerText = msg;
  const btn = document.getElementById('confirmOkBtn');
  btn.onclick = () => { onConfirm(); closeModal(); };
  document.getElementById('confirmModal').classList.add('open');
};
window.closeModal = () => document.getElementById('confirmModal').classList.remove('open');
window.changeDate = (delta) => {
  const inp = document.getElementById('globalDate');
  const d = new Date(inp.value+'T12:00:00');
  d.setDate(d.getDate() + delta);
  inp.value = d.toISOString().split('T')[0];
  onDateChange();
};
function fmtThai(ds){ const d = new Date(ds+'T12:00:00'); return `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear()+543}`; }
function updateDateDisplay(){ const d = new Date(document.getElementById('globalDate').value+'T12:00:00'); document.getElementById('dateDisplay').innerText = `วันที่ ${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear()+543}`; }

const today = new Date().toISOString().split('T')[0];
document.getElementById('globalDate').value = today;
document.getElementById('historyMonth').value = today.substring(0,7);
document.getElementById('summaryMonth').value = today.substring(0,7);
document.getElementById('summaryDate').value = today;
onDateChange();
</script>
